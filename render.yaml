services:
  - type: web
    name: shopnowui
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENABLE_RABBITMQ
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSLMODE
        value: require
